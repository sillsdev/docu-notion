name: Release
on:
  push:
    branches: [main, release]
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.16.0
          package-manager-cache: false
      - name: Setup npm
        run: npm install --global npm@11.16.0
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # semantic-release publishes via `npm publish <dir>`, which npm treats as a
          # non-root directory spec and rejects under .npmrc's allow-directory=root.
          # Relax it for the publish step only; npm ci keeps full install hardening.
          NPM_CONFIG_ALLOW_DIRECTORY: all
        run: npm run semantic-release
